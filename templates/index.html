<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Inception Fanbase API</title>
</head>
<body class="bg-slate-900 text-white min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-5xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
            Inception Fanbase API
        </h1>
        <p class="mb-8 text-slate-400">Explore the layers of the 2010 masterpiece.</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            {% for char in characters %}
            <div class="p-6 bg-slate-800 border border-slate-700 rounded-xl hover:scale-105 transition-transform duration-300 shadow-xl">
                <h2 class="text-2xl font-semibold">{{ char.name }}</h2>
                <p class="text-emerald-400">{{ char.role }}</p>
                <div class="mt-4 pt-4 border-t border-slate-700 flex justify-between items-center">
                    <span class="text-sm text-slate-500">Played by</span>
                    <span class="font-medium text-blue-300">{{ char.actor }}</span>
                </div>
            </div>
            {% endfor %}
        </div>
        
        <footer class="mt-12 text-center text-slate-500 text-sm">
            Access the JSON data at <a href="/api/characters" class="underline">/api/characters</a>
        </footer>
    </div>
</body>
</html>
