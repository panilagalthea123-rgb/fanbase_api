<!DOCTYPE html>
<html>
<head>
    <title>Peppa Pig Fanbase</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🐷 Peppa Pig Fanbase API</h1>

<div class="grid">
    {% for c in characters %}
    <div class="card">
        <img src="{{ c.image }}">
        <h2>{{ c.name }}</h2>
        <p>{{ c.desc }}</p>
        <small>🎤 {{ c.actor }}</small>
    </div>
    {% endfor %}
</div>

</body>
</html>
