<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peppa Pig Fanbase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fce4ec; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero { background: #f06292; color: white; padding: 40px 0; text-align: center; margin-bottom: 30px; border-bottom: 5px solid #ec407a; }
        .card { border: none; border-radius: 20px; transition: all 0.3s ease; cursor: pointer; height: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card:hover { transform: translateY(-10px); box-shadow: 0 12px 20px rgba(0,0,0,0.2); }
        .char-img { height: 180px; object-fit: contain; padding: 20px; }
        .badge-actor { background-color: #f8bbd0; color: #880e4f; font-weight: bold; border-radius: 10px; padding: 5px 10px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Oink! Welcome to the Peppa Fanbase</h1>
        <p>Explore characters and cast information directly from our API</p>
    </div>

    <div class="container">
        <div class="row g-4">
            {% for char in characters %}
            <div class="col-md-3">
                <div class="card text-center">
                    <img src="{{ char.image }}" class="char-img" alt="{{ char.name }}">
                    <div class="card-body">
                        <h4 class="card-title text-danger">{{ char.name }}</h4>
                        <p class="badge-actor mb-3">Played by: {{ char.actor }}</p>
                        <p class="card-text text-muted" style="font-size: 0.9rem;">{{ char.description }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        
        <footer class="mt-5 mb-4 text-center">
            <hr>
            <p class="text-muted">Direct API Links: 
                <a href="/api/characters" class="text-danger">/characters</a> | 
                <a href="/api/actors" class="text-danger">/actors</a>
            </p>
        </footer>
    </div>
</body>
</html>
