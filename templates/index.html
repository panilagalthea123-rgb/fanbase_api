<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Peppa Pig Fanbase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #ffccf2; font-family: 'Comic Sans MS', cursive; }
        .hero { background: #fff; padding: 40px; border-radius: 20px; margin-top: 20px; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); }
        .card { border-radius: 15px; overflow: hidden; transition: transform 0.2s; margin-bottom: 20px; }
        .card:hover { transform: scale(1.05); }
        .char-img { height: 200px; object-fit: contain; background: #f9f9f9; padding: 10px; }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="hero">
            <h1 class="display-4 text-danger">🐷 Peppa Pig Fanbase API</h1>
            <p class="lead">Exploring the world of Peppa and her friends!</p>
        </div>

        <div class="row mt-5">
            {% for char in characters %}
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <img src="{{ char.img }}" class="card-img-top char-img" alt="{{ char.name }}">
                    <div class="card-body text-start">
                        <h5 class="card-title fw-bold">{{ char.name }}</h5>
                        <p class="badge bg-primary mb-1">{{ char.role }}</p>
                        <p class="text-muted small"><strong>Actor:</strong> {{ char.actor }}</p>
                        <p class="card-text">{{ char.desc }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
