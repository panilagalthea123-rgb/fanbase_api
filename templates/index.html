<!DOCTYPE html>
<html>
<head>
    <title>Spider-Verse Fanbase</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0b1a; color: white; font-family: 'Inter', sans-serif; padding: 50px; }
        h1 { font-family: 'Bungee', cursive; color: #ff0055; text-shadow: 3px 3px #00f2ff; text-align: center; font-size: 3rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 40px; }
        .card { background: rgba(255, 255, 255, 0.1); border: 2px solid #ff0055; padding: 20px; border-radius: 10px; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: skewX(-2deg); box-shadow: 5px 5px #00f2ff; background: rgba(255, 0, 85, 0.2); }
        .alias { color: #00f2ff; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        .actor { font-style: italic; color: #aaa; margin-top: 10px; display: block; }
        .nav { text-align: center; margin-bottom: 20px; }
        .nav a { color: #00f2ff; margin: 0 10px; text-decoration: none; border-bottom: 1px solid; }
    </style>
</head>
<body>
    <h1>SPIDER-VERSE API</h1>
    <div class="nav">
        <a href="/api/characters">JSON: Characters</a> | 
        <a href="/api/actors">JSON: Actors</a> |
        <a href="/docs">Swagger UI</a>
    </div>

    <div class="grid">
        {% for char in characters %}
        <div class="card" onclick="alert('{{ char.description }}')">
            <div class="alias">{{ char.alias }}</div>
            <h2>{{ char.name }}</h2>
            <span class="actor">Played by: {{ char.actor }}</span>
        </div>
        {% endfor %}
    </div>
</body>
</html>
