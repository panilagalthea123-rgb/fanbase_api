<!DOCTYPE html>
<html>
<head>
    <title>Peppa Pig Fanbase API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #ffcce6; font-family: 'Comic Sans MS', cursive; }
        .hero { background: #ff66b2; color: white; padding: 2rem; text-align: center; border-radius: 0 0 50px 50px; }
        .card { border-radius: 20px; transition: transform 0.2s; border: 3px solid #ff66b2; }
        .card:hover { transform: scale(1.05); }
        .badge-species { background-color: #ff66b2; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>🐷 Peppa Pig Fanbase Explorer</h1>
        <p>Your interactive guide to the Peppa Universe!</p>
    </div>

    <div class="container mt-5">
        <div class="row">
            {% for char in characters %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary">Name: {{ char.name }}</h5>
                        <p class="card-text"><strong>Voice Actor:</strong> {{ char.actor }}</p>
                        <span class="badge badge-species">{{ char.species }}</span>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
