<!DOCTYPE html>
<html>
<head>
    <title>Peppa Pig Fanbase API</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, pink, lightblue);
            text-align: center;
        }
        button {
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        #output {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            width: 60%;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>

<h1>🐷 Peppa Pig Fanbase API</h1>

<button onclick="getCharacters()">Get All Characters</button>
<button onclick="getActors()">Get Actors</button>

<br><br>

<input type="number" id="charId" placeholder="Enter Character ID">
<button onclick="getCharacter()">Get Character</button>

<div id="output"></div>

<script>
async function getCharacters() {
    let res = await fetch('/characters');
    let data = await res.json();
    display(data);
}

async function getActors() {
    let res = await fetch('/actors');
    let data = await res.json();
    display(data);
}

async function getCharacter() {
    let id = document.getElementById('charId').value;
    let res = await fetch(`/characters/${id}`);
    let data = await res.json();
    display(data);
}

function display(data) {
    document.getElementById('output').innerHTML =
        "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
}
</script>

</body>
</html>
