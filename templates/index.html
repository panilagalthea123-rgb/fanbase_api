<!DOCTYPE html>
<html>
<head>
    <title>Peppa Fanbase API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #fff0f6; font-family: 'Comic Sans MS', sans-serif; }
        .card { border-radius: 20px; transition: 0.3s; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card:hover { transform: scale(1.05); background: #ffdeeb; }
        .hero { background: #ff85b3; color: white; padding: 50px 0; border-radius: 0 0 50% 50% / 20px; }
    </style>
</head>
<body>
    <div class="hero text-center mb-5">
        <h1>Oink! Peppa Pig Fanbase</h1>
        <p>Interactive Character API Interface</p>
    </div>
    <div class="container">
        <div class="row g-4">
            {% for char in characters %}
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <img src="{{ char.image }}" style="height:150px; object-fit:contain;">
                    <h4 class="mt-3 text-danger">{{ char.name }}</h4>
                    <small class="text-muted">Actor: {{ char.actor }}</small>
                    <p class="mt-2" style="font-size: 0.85rem;">{{ char.description }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
